<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件导入服务</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            background-color: #0f172a;
            background-image: radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
            radial-gradient(circle at 85% 30%, rgba(129, 140, 248, 0.08) 0%, transparent 50%),
            linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: #e2e8f0;
        }

        h1 {
            color: #f8fafc;
            text-align: center;
            margin: 0 0 24px;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            font-size: 24px;
        }

        .upload-area {
            border: 2px dashed rgba(56, 189, 248, 0.4);
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            padding: 36px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .upload-area:hover {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.05);
            box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.1);
        }
        .upload-area.active {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.12);
            transform: scale(1.01);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.5));
        }
        .upload-text {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
        }
        .file-input {
            display: none;
        }

        .file-list {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .empty-tip {
            text-align: center;
            color: #64748b;
            padding: 40px 0;
            font-size: 14px;
        }

        .file-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            gap: 12px;
        }
        .file-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: rgba(56, 189, 248, 0.3);
        }
        .file-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }
        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            gap: 10px;
        }
        .file-name {
            font-weight: 600;
            color: #f1f5f9;
            font-size: 16px;
            word-break: break-all;
            overflow: hidden;
        }
        .file-size {
            font-size: 13px;
            color: #64748b;
            white-space: nowrap;
        }

        .status-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            min-width: 76px;
            text-align: center;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            white-space: nowrap;
        }
        .cancel-btn {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .cancel-btn:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .status-uploading {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        .status-processing {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }
        .status-completed {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        .status-error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .progress-wrapper {
            margin-top: 8px;
            display: none;
        }
        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: rgba(15, 23, 42, 0.8);
            border-radius: 3px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 3px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.4s;
            position: relative;
            overflow: hidden;
        }
        .progress-bar::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .progress-text {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 6px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .log-details {
            margin-top: 14px;
            font-size: 13px;
            color: #cbd5e1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .log-details summary {
            cursor: pointer;
            user-select: none;
            color: #94a3b8;
            outline: none;
            display: flex;
            align-items: center;
            font-weight: 500;
        }
        .log-details summary:hover {
            color: #38bdf8;
        }
        .log-list {
            margin: 10px 0 0;
            padding: 0;
            list-style: none;
            max-height: 140px;
            overflow-y: auto;
        }
        .log-list::-webkit-scrollbar { width: 6px; }
        .log-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 3px; }
        .log-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .log-list li {
            margin: 5px 0;
            line-height: 1.5;
            display: flex;
            align-items: center;
        }
        .log-list li::before {
            content: "•";
            color: #38bdf8;
            font-weight: bold;
            display: inline-block;
            width: 1em;
            margin-left: -1em;
            margin-right: 8px;
        }
        .log-done { color: #a7f3d0; }
        .log-done::before { content: "✓" !important; color: #10b981 !important; }
        .log-running {
            color: #bae6fd;
            animation: pulseText 2s infinite;
        }
        .log-running::before {
            content: "↻" !important;
            color: #3b82f6 !important;
            animation: spin 2s linear infinite;
        }
        @keyframes pulseText {
            0%,100% { opacity:1; }
            50% { opacity:0.7; }
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* 全局提示弹窗 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            z-index: 9999;
            animation: toastIn .3s ease;
            max-width: 90%;
        }
        .toast.error { background: #ef4444; }
        .toast.success { background: #10b981; }
        @keyframes toastIn {
            from { opacity: 0; top: 0; }
            to { opacity: 1; top: 20px; }
        }

        /* 移动端适配 */
        @media (max-width: 640px) {
            .file-item { flex-direction: column; }
            .status-wrap { flex-direction: row; justify-content: flex-end; width: 100%; }
            .upload-area { padding: 28px 12px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📄 知识库文件导入</h1>
    <div class="upload-area" id="dropZone">
        <div class="upload-icon">☁️</div>
        <div class="upload-text">点击或拖拽文件到此处<br>仅支持 PDF / MD，单文件上限50MB</div>
        <input type="file" id="fileInput" class="file-input" multiple accept=".pdf,.md">
    </div>
    <div id="fileList" class="file-list">
        <div class="empty-tip">暂无上传任务，请选择文件上传</div>
    </div>
</div>

<script>
// ===================== 全局配置区 =====================
const CONFIG = {
    API_BASE: 'http://127.0.0.1:8000',
    MAX_SIZE: 50 * 1024 * 1024, // 50MB
    ALLOW_EXT: ['.pdf', '.md'],
    POLL_INTERVAL: 1500,
    POLL_TIMEOUT: 300000, // 5分钟超时
    TOAST_DURATION: 2500
};
// 全局任务池：存储每个上传任务控制器、定时器、taskId
const taskMap = new Map();
// DOM缓存
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');

// ===================== 工具函数 =====================
/** 弹窗提示 */
function showToast(msg, type = 'error') {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), CONFIG.TOAST_DURATION);
}

/** 格式化文件大小 */
function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
    return (bytes / 1024 / 1024).toFixed(2) + ' MB';
}

/** 生成唯一ID，无重复风险 */
function genUniqueId() {
    return 'file-' + Date.now() + '-' + Math.floor(Math.random() * 100000);
}

/** XSS转义文本 */
function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
}

/** 更新进度条UI */
function updateProgressUI(wrapper, percentage) {
    const bar = wrapper.querySelector('.progress-bar');
    const text = wrapper.querySelector('.progress-text');
    const safe = Math.min(Math.max(percentage, 0), 100);
    bar.style.width = safe + '%';
    text.textContent = Math.round(safe) + '%';
    if (safe >= 100) bar.style.background = 'linear-gradient(90deg, #10b981, #34d399)';
    else if (safe < 10) bar.style.background = 'linear-gradient(90deg, #f59e0b, #fbbf24)';
    else bar.style.background = 'linear-gradient(90deg, #3b82f6, #60a5fa)';
}

/** 清空空提示 */
function clearEmptyTip() {
    const empty = fileList.querySelector('.empty-tip');
    if (empty) empty.remove();
}

// ===================== 拖拽&选择文件事件 =====================
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('active');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('active');
    handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));

// ===================== 文件校验入口 =====================
function handleFiles(fileArr) {
    Array.from(fileArr).forEach(file => {
        const fileName = file.name;
        const ext = '.' + fileName.split('.').pop().toLowerCase();
        // 校验后缀
        if (!CONFIG.ALLOW_EXT.includes(ext)) {
            showToast(`文件【${fileName}】格式不支持，仅允许PDF、MD`);
            return;
        }
        // 校验空文件
        if (file.size <= 0) {
            showToast(`文件【${fileName}】为空，禁止上传`);
            return;
        }
        // 校验大小
        if (file.size > CONFIG.MAX_SIZE) {
            showToast(`文件【${fileName}】超过50MB上限`);
            return;
        }
        uploadFile(file);
    });
}

// ===================== 文件上传主逻辑 =====================
async function uploadFile(file) {
    clearEmptyTip();
    const fileId = genUniqueId();
    const fileSizeText = formatFileSize(file.size);
    const fileNameEsc = escapeHtml(file.name);
    // 渲染任务卡片
    const itemHtml = `
    <div class="file-item" id="${fileId}">
        <div class="file-info">
            <div class="file-header">
                <span class="file-name" title="${fileNameEsc}">${fileNameEsc}</span>
                <span class="file-size">${fileSizeText}</span>
            </div>
            <div class="progress-wrapper">
                <div class="progress-bar-container"><div class="progress-bar"></div></div>
                <div class="progress-text">0%</div>
            </div>
            <details class="log-details" open>
                <summary>📋 运行日志</summary>
                <ul class="log-list"></ul>
            </details>
        </div>
        <div class="status-wrap">
            <span class="status-badge status-uploading">上传中</span>
            <button class="cancel-btn" data-id="${fileId}">取消</button>
        </div>
    </div>`;
    fileList.insertAdjacentHTML('afterbegin', itemHtml);
    const itemEl = document.getElementById(fileId);
    const statusBadge = itemEl.querySelector('.status-badge');
    const progressWrapper = itemEl.querySelector('.progress-wrapper');
    const logListEl = itemEl.querySelector('.log-list');
    const cancelBtn = itemEl.querySelector('.cancel-btn');

    // 取消上传控制器
    const abortCtrl = new AbortController();
    let pollTimer = null;
    let taskId = null;
    // 存入全局任务池
    taskMap.set(fileId, { abortCtrl, pollTimer, taskId, itemEl });

    // 取消按钮事件
    cancelBtn.onclick = () => {
        abortCtrl.abort();
        if (pollTimer) clearInterval(pollTimer);
        statusBadge.textContent = '已取消';
        statusBadge.className = 'status-badge status-error';
        cancelBtn.style.display = 'none';
        const li = document.createElement('li');
        li.style.color = '#fca5a5';
        li.textContent = '用户手动取消上传任务';
        logListEl.appendChild(li);
    };

    try {
        progressWrapper.style.display = 'block';
        // 写入初始日志
        const initLog = document.createElement('li');
        initLog.className = 'log-running';
        initLog.textContent = '开始上传文件至服务端';
        logListEl.appendChild(initLog);

        // 区分PDF/MD节点总数
        const isPDF = file.name.toLowerCase().endsWith('.pdf');
        const totalNodes = isPDF ? 7 : 6;

        // 构建表单
        const formData = new FormData();
        formData.append('file', file);
        // 上传请求，绑定中断信号
        const uploadRes = await fetch(`${CONFIG.API_BASE}/upload`, {
            method: 'POST',
            body: formData,
            signal: abortCtrl.signal
        });
        // 请求被中断直接退出
        if (abortCtrl.signal.aborted) return;
        if (!uploadRes.ok) throw new Error(`服务端返回${uploadRes.status}`);
        // 解析任务ID
        const resData = await uploadRes.json();
        if (!resData?.task_id) throw new Error('后端未返回task_id');
        taskId = resData.task_id;
        taskMap.get(fileId).taskId = taskId;
        // 更新状态
        initLog.className = 'log-done';
        initLog.textContent = '文件上传完成，等待处理流程';
        statusBadge.textContent = '处理中';
        statusBadge.className = 'status-badge status-processing';
        updateProgressUI(progressWrapper, (1 / totalNodes) * 100);
        cancelBtn.style.display = 'none';
        // 启动轮询
        startPoll(fileId, taskId, totalNodes);
    } catch (err) {
        if (err.name === 'AbortError') return;
        console.error('上传失败', err);
        statusBadge.textContent = '上传失败';
        statusBadge.className = 'status-badge status-error';
        cancelBtn.style.display = 'none';
        const errLog = document.createElement('li');
        errLog.style.color = '#fca5a5';
        errLog.textContent = `❌ 上传异常：${escapeHtml(err.message)}`;
        logListEl.appendChild(errLog);
    }
}

// ===================== 轮询任务状态 =====================
function startPoll(fileId, taskId, totalNodes) {
    const taskInfo = taskMap.get(fileId);
    const { itemEl, abortCtrl } = taskInfo;
    const statusBadge = itemEl.querySelector('.status-badge');
    const progressWrapper = itemEl.querySelector('.progress-wrapper');
    const logDetails = itemEl.querySelector('.log-details');
    let pollStart = Date.now();

    const pollFn = async () => {
        // 超时判断
        if (Date.now() - pollStart > CONFIG.POLL_TIMEOUT) {
            clearInterval(taskInfo.pollTimer);
            statusBadge.textContent = '任务超时';
            statusBadge.className = 'status-badge status-error';
            const logList = itemEl.querySelector('.log-list');
            const li = document.createElement('li');
            li.style.color = '#fca5a5';
            li.textContent = '任务执行超时，已终止轮询';
            logList.appendChild(li);
            return;
        }
        try {
            const res = await fetch(`${CONFIG.API_BASE}/status/${taskId}`, {
                signal: abortCtrl.signal
            });
            if (!res.ok) throw new Error(`状态接口异常${res.status}`);
            const data = await res.json();
            // 兜底空数组
            const doneList = Array.isArray(data.done_list) ? data.done_list : [];
            const runningList = Array.isArray(data.running_list) ? data.running_list : [];
            // 渲染日志并计算进度
            const percent = renderTaskLog(itemEl, doneList, runningList, totalNodes);
            updateProgressUI(progressWrapper, percent);

            if (data.status === 'completed') {
                clearInterval(taskInfo.pollTimer);
                statusBadge.textContent = '已完成';
                statusBadge.className = 'status-badge status-completed';
                updateProgressUI(progressWrapper, 100);
                setTimeout(() => logDetails.open = false, 1200);
                taskMap.delete(fileId);
            } else if (data.status === 'failed') {
                clearInterval(taskInfo.pollTimer);
                statusBadge.textContent = '处理失败';
                statusBadge.className = 'status-badge status-error';
                const logList = itemEl.querySelector('.log-list');
                const li = document.createElement('li');
                li.style.color = '#fca5a5';
                li.textContent = '❌ 工作流执行失败，任务中止';
                logList.appendChild(li);
                taskMap.delete(fileId);
            }
        } catch (e) {
            if (e.name === 'AbortError') return;
            console.warn('轮询请求失败，等待下次重试', e);
        }
    };
    taskInfo.pollTimer = setInterval(pollFn, CONFIG.POLL_INTERVAL);
    pollFn(); // 立即执行一次
}

// ===================== 日志渲染 & 进度计算 =====================
function renderTaskLog(itemEl, doneList, runningList, totalNodes) {
    const logSummary = itemEl.querySelector('.log-details summary');
    const logListEl = itemEl.querySelector('.log-list');
    logListEl.innerHTML = '';
    // 固定上传完成日志
    const uploadLi = document.createElement('li');
    uploadLi.className = 'log-done';
    uploadLi.textContent = '开始执行导入功能的节点...';
    logListEl.appendChild(uploadLi);

    // 过滤upload_file避免重复
    const filterDone = doneList.filter(name => name !== 'upload_file');
    // 已完成节点
    filterDone.forEach(name => {
        const li = document.createElement('li');
        li.className = 'log-done';
        li.textContent = `${escapeHtml(name)} 节点执行完成`;
        logListEl.appendChild(li);
    });
    // 运行中节点
    runningList.forEach(name => {
        const li = document.createElement('li');
        li.className = 'log-running';
        li.textContent = `正在处理 ${escapeHtml(name)} 节点...`;
        logListEl.appendChild(li);
    });
    logListEl.scrollTop = logListEl.scrollHeight;
    logSummary.textContent = `📋 运行日志 (总${totalNodes}个流程节点)`;

    // 进度计算优化
    let percent = (filterDone.length / totalNodes) * 100;
    if (runningList.length > 0) percent += (0.5 / totalNodes) * 100;
    // 未完成最高99，完成强制100
    return Math.min(percent, 99);
}

// 页面销毁清除所有定时器
window.addEventListener('beforeunload', () => {
    taskMap.forEach(info => {
        if (info.pollTimer) clearInterval(info.pollTimer);
        info.abortCtrl.abort();
    });
    taskMap.clear();
});
</script>
</body>
</html>
