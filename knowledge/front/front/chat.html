<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>问器知识库</title>
  <style>
    :root{
      --bg:#0f172a;
      --panel:rgba(30, 41, 59, 0.7);
      --text:#e2e8f0;
      --muted:#94a3b8;
      --brand:#38bdf8;
      --brand2:#818cf8;
      --bubble-user:linear-gradient(135deg, #38bdf8, #818cf8);
      --bubble-bot:rgba(15, 23, 42, 0.6);
      --border:rgba(255, 255, 255, 0.1);
      --shadow:0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, Arial, sans-serif;
      background-color: #0f172a;
      background-image: radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(129, 140, 248, 0.08) 0%, transparent 50%),
                        linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      color:var(--text);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:18px;
    }
    .app{
      width:100%;
      max-width:980px;
      height:min(820px, 92vh);
      background:var(--panel);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .topbar{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 18px;
      border-bottom:1px solid var(--border);
      background:rgba(15, 23, 42, 0.5);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:240px;
    }
    .logo{
      width:36px;height:36px;border-radius:10px;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
      box-shadow:0 0 20px rgba(56, 189, 248, 0.4);
    }
    .title{
      display:flex;
      flex-direction:column;
      line-height:1.1;
    }
    .title strong{font-size:14px}
    .title span{font-size:12px;color:var(--muted);margin-top:3px}
    .top-actions{
      margin-left:auto;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .pill{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--border);
      padding:6px 10px;
      border-radius:999px;
      background:rgba(15, 23, 42, 0.6);
    }
    .btn{
      border:none;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
      color:#fff;
      padding:8px 12px;
      border-radius:10px;
      font-size:12px;
      cursor:pointer;
    }
    .btn:disabled{opacity:.6;cursor:not-allowed}

    .chat{
      flex:1;
      overflow:auto;
      padding:16px 14px 10px;
      background:rgba(15, 23, 42, 0.3);
    }
    .dayline{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      margin:6px 0 14px;
    }
    .msg{
      display:flex;
      gap:10px;
      margin:10px 0;
      align-items:flex-end;
    }
    .msg.user{justify-content:flex-end}
    /* 关键：只让“消息内容容器”(排除头像)在 flex 中可伸缩，避免被压到“1 个字宽”导致竖排换行 */
    .msg > div:not(.avatar){
      flex:1;
      min-width:0;
    }
    .msg.user > div:not(.avatar){
      display:flex;
      flex-direction:column;
      align-items:flex-end;
    }
    .avatar{
      width:34px;height:34px;border-radius:10px;
      background:rgba(56, 189, 248, 0.15);
      display:flex;align-items:center;justify-content:center;
      font-size:14px;
      color:#94a3b8;
      flex:0 0 auto;
    }
    .avatar.bot{background:linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(129, 140, 248, 0.2))}
    .bubble{
      max-width:min(720px, 76%);
      display:inline-block;
      border-radius:14px;
      padding:10px 12px;
      border:1px solid var(--border);
      background:var(--bubble-bot);
      position:relative;
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
      overflow-wrap: break-word;
      color:#e2e8f0;
    }
    .msg.user .bubble{
      background:var(--bubble-user);
      color:#fff;
      border-color:transparent;
    }
    .meta{
      font-size:11px;
      color:var(--muted);
      margin-top:6px;
    }
    .msg.user .meta{color:rgba(255,255,255,.85)}
    details.progress{
      margin-top:8px;
      border:1px dashed rgba(56, 189, 248, 0.3);
      border-radius:12px;
      padding:8px 10px;
      background:rgba(15, 23, 42, 0.4);
    }
    details.progress summary{
      cursor:pointer;
      user-select:none;
      color:var(--muted);
      font-size:12px;
    }
    .progress ul{margin:8px 0 0 18px;padding:0}
    .progress li{margin:4px 0;font-size:12px;color:#94a3b8}

    .answer-images{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .answer-images img{
      display: block;
      max-width: min(100%, 600px);
      max-height: 600px;
      width: auto;
      height: auto;
      border-radius:12px;
      border:1px solid var(--border);
      box-shadow:0 10px 24px rgba(0, 0, 0, 0.3);
      background:rgba(15, 23, 42, 0.6);
    }
    .answer-images a{
      font-size:12px;
      color:var(--muted);
      text-decoration:none;
      word-break:break-all;
    }

    .typing{
      display:inline-flex;gap:6px;align-items:center;
    }
    .dot{
      width:7px;height:7px;border-radius:50%;
      background:#38bdf8;
      animation:bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2){animation-delay:.15s}
    .dot:nth-child(3){animation-delay:.3s}
    @keyframes bounce{
      0%,80%,100%{transform:translateY(0);opacity:.6}
      40%{transform:translateY(-5px);opacity:1}
    }

    .composer{
      border-top:1px solid var(--border);
      padding:12px 14px;
      display:flex;
      gap:10px;
      align-items:flex-end;
      background:rgba(15, 23, 42, 0.5);
    }
    textarea{
      flex:1;
      resize:none;
      min-height:44px;
      max-height:140px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      outline:none;
      font-size:14px;
      line-height:1.5;
      background:rgba(15, 23, 42, 0.6);
      color:#e2e8f0;
    }
    textarea:focus{border-color:rgba(56, 189, 248, 0.6); box-shadow:0 0 0 3px rgba(56, 189, 248, 0.15)}
    textarea::placeholder{color:#64748b}
    .send{
      width:88px;
      height:44px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
      color:#fff;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
      box-shadow:0 0 15px rgba(56, 189, 248, 0.3);
    }
    .send:disabled{opacity:.6;cursor:not-allowed}
    .hint{
      padding:0 14px 12px;
      color:var(--muted);
      font-size:12px;
      background:transparent;
    }
    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      border:1px solid var(--border);
      padding:1px 6px;
      border-radius:6px;
      background:rgba(15, 23, 42, 0.6);
      color:#94a3b8;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <strong>问器知识库</strong>
          <span id="subTitle">在线 · 可查询知识库与联网信息</span>
        </div>
      </div>
      <div class="top-actions">
        <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;color:var(--muted);margin-right:10px;">
          <input type="checkbox" id="streamToggle" checked> 流式输出
        </label>
        <button class="btn" id="btnClear">清空对话</button>
      </div>
    </div>

    <div class="chat" id="chat">
      <div class="dayline">今天</div>
      <div class="msg bot">
        <div class="avatar bot">问器</div>
        <div>
          <div class="bubble">你好，我是问器知识库客服。你可以直接提问，我会在“阶段进度”里展示处理过程。</div>
          <div class="meta">提示：可以问“如何使用万用表测量电压？”</div>
        </div>
      </div>
    </div>

    <div class="composer">
      <textarea id="input" placeholder="请输入问题（Enter 发送，Shift+Enter 换行）"></textarea>
      <button class="send" id="send">发送</button>
    </div>
    <div class="hint">快捷键：<span class="kbd">Enter</span> 发送，<span class="kbd">Shift</span>+<span class="kbd">Enter</span> 换行</div>
  </div>

 <script>
    // ================= 核心配置 =================
    const API_BASE = `${location.protocol}//${location.host}`.includes('http') ? `${location.protocol}//${location.host}` : 'http://127.0.0.1:8001';
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const btnClear = document.getElementById('btnClear');
    const streamToggle = document.getElementById('streamToggle');

    // Session ID Logic
    let sessionId = localStorage.getItem('kb_session_id');
    if (!sessionId) {
        sessionId = 'sess-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem('kb_session_id', sessionId);
    }

    function scrollToBottom(){ chatEl.scrollTop = chatEl.scrollHeight; }
    function nowTime(){ return new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}); }
    function formatTime(ts){
        if(!ts) return nowTime();
        const d = new Date(Number(ts) * 1000);
        return Number.isNaN(d.getTime()) ? nowTime() : d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    }
    function escapeHtml(str){
        return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");
    }

    // ================= 图片解析工具 =================
    function isImageUrl(url){
        try { return /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(new URL(url).pathname); }
        catch (e) { return /\.(png|jpe?g|gif|webp|bmp|svg)(\?|#|$)/i.test(url || ''); }
    }
    function normalizeUrl(rawUrl){ return String(rawUrl || '').trim().replace(/\s/g, '%20'); }
    function dedupeKeepOrder(arr){
        const seen = new Set(), out = [];
        for(const x of (Array.isArray(arr) ? arr : [])){
            const v = String(x || ''); if(!v || seen.has(v)) continue; seen.add(v); out.push(v);
        } return out;
    }
    function extractUrlsLoose(text){
        const matches = String(text || '').match(/(https?:\/\/[^\s]+)/g) || [];
        return dedupeKeepOrder(matches.map(u => u.replace(/^[<([{'"]+|[)\]}'">，。,;；\]】）＞]+$/g, '')));
    }
    function findLastImageMarkerIndex(raw){
        const re = /【\s*图片\s*】|\[\s*图片\s*\]/g; let m, lastIdx = -1, lastLen = 0;
        while((m = re.exec(raw)) !== null){ lastIdx = m.index; lastLen = m[0].length; }
        return { idx: lastIdx, len: lastLen };
    }
    function parseAnswerAndImages(text){
        const raw = String(text || ''); const { idx, len } = findLastImageMarkerIndex(raw);
        if(idx === -1) return { text: raw, images: [] };
        const before = raw.slice(0, idx).trimEnd(), after = raw.slice(idx + len).trim();
        const urls = [];
        for(const line of after.split(/\r?\n/).map(l => l.trim()).filter(Boolean)){
            if(line.startsWith('http')) urls.push(line); else urls.push(...extractUrlsLoose(line));
        }
        const images = dedupeKeepOrder(urls.map(normalizeUrl).filter(isImageUrl));
        return { text: before, images };
    }
    function renderAnswerWithImages(containerEl, answerText, candidateImageUrls){
        const { text, images: blockImgs } = parseAnswerAndImages(answerText);
        const looseImgs = extractUrlsLoose(answerText).map(normalizeUrl).filter(isImageUrl);
        const candidates = Array.isArray(candidateImageUrls) ? candidateImageUrls.map(normalizeUrl).filter(isImageUrl) : [];

        const allImages = Array.from(new Set([...(blockImgs||[]), ...candidates, ...looseImgs]));
        containerEl.innerHTML = '';

        const textEl = document.createElement('div'); textEl.className = 'answer-text';
        textEl.textContent = (text || '').trim() || '（已完成，但未返回答案）';
        containerEl.appendChild(textEl);

        if(allImages.length > 0){
            const imgWrap = document.createElement('div'); imgWrap.className = 'answer-images';
            allImages.forEach(url => {
                const img = document.createElement('img'); img.loading='lazy'; img.src=url; img.alt='参考图片';
                img.referrerPolicy='no-referrer'; img.onerror=()=>img.style.display='none'; imgWrap.appendChild(img);
                const link = document.createElement('a'); link.href=url; link.target='_blank'; link.rel='noopener noreferrer';
                link.textContent=url; imgWrap.appendChild(link);
            });
            containerEl.appendChild(imgWrap);
        }
    }

    // ================= UI 渲染函数 =================
    function addUserMsg(text){
        chatEl.insertAdjacentHTML('beforeend', `<div class="msg user"><div><div class="bubble">${escapeHtml(text)}</div><div class="meta">${nowTime()}</div></div><div class="avatar">我</div></div>`);
        scrollToBottom();
    }
    function addUserMsgWithTime(text, ts){
        chatEl.insertAdjacentHTML('beforeend', `<div class="msg user"><div><div class="bubble">${escapeHtml(text)}</div><div class="meta">${formatTime(ts)}</div></div><div class="avatar">我</div></div>`);
        scrollToBottom();
    }
    function addBotMsgWithTime(text, ts, imageUrls){
        const id = 'bot-his-' + Math.random().toString(36).slice(2);
        chatEl.insertAdjacentHTML('beforeend', `<div class="msg bot" id="${id}"><div class="avatar bot">问器</div><div><div class="bubble"><div class="answer"></div></div><div class="meta">${formatTime(ts)}</div></div></div>`);
        renderAnswerWithImages(document.querySelector(`#${id} .answer`), text || '', imageUrls || []);
        scrollToBottom();
    }
    function addBotMsgSkeleton(){
        const id = 'bot-' + Math.random().toString(36).slice(2);
        chatEl.insertAdjacentHTML('beforeend', `
            <div class="msg bot" id="${id}"><div class="avatar bot">问器</div><div style="min-width: 180px;"><div class="bubble">
                <span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
                <details class="progress" open><summary>阶段进度（等待中）</summary><ul></ul></details>
            </div><div class="meta">${nowTime()}</div></div></div>`);
        scrollToBottom(); return document.getElementById(id);
    }
    function renderProgress(botMsgEl, doneList, runningList, status){
        const details = botMsgEl?.querySelector('details.progress'); if(!details) return;
        const summary = details.querySelector('summary'), ul = details.querySelector('ul');
        const done = doneList || [], running = runningList || [];
        const statusMap = {'processing':'处理中','completed':'已完成','failed':'失败','pending':'等待中'};
        summary.textContent = `阶段进度（已完成${done.length}，进行中${running.length}，状态：${statusMap[status]||status||'unknown'}）`;
        ul.innerHTML = '';
        const lines = [...done.map(x=>`✅ ${x}`), ...running.map(x=>`⏳ ${x}`)];
        if(lines.length===0) ul.insertAdjacentHTML('beforeend','<li>暂无进度</li>');
        else lines.forEach(l => ul.insertAdjacentHTML('beforeend', `<li>${escapeHtml(l)}</li>`));
    }
    function finalizeBotAnswer(botMsgEl, answer, error, imageUrls){
        const bubble = botMsgEl.querySelector('.bubble'), progress = botMsgEl.querySelector('details.progress'), typing = botMsgEl.querySelector('.typing');
        if(typing) typing.remove();
        if(progress) progress.removeAttribute('open');
        bubble.innerHTML = ''; // 清空原有结构
        const answerEl = document.createElement('div'); answerEl.className = 'answer'; bubble.appendChild(answerEl);
        if(error && error.trim()){ answerEl.textContent = `抱歉，本次处理失败：\n${error}`; return; }
        renderAnswerWithImages(answerEl, answer || '', imageUrls || []);
    }

    // ================= 核心请求与路由控制 =================
    async function loadHistory(){
        try{
            const res = await fetch(`${API_BASE}/history/${sessionId}`); if(!res.ok) return;
            const data = await res.json(), items = data.items || []; if(items.length===0) return;
            const nodes = Array.from(chatEl.querySelectorAll('.msg'));
            for(let i=1;i<nodes.length;i++) nodes[i].remove();
            items.forEach(item => item.role==='user' ? addUserMsgWithTime(item.text, item.ts) : addBotMsgWithTime(item.text, item.ts, item.image_urls));
            scrollToBottom();
        }catch(_){}
    }

    async function onSend(){
        const text = (inputEl.value || '').trim(); if(!text || sendBtn.disabled) return;
        inputEl.value = ''; addUserMsg(text);
        const botMsgEl = addBotMsgSkeleton(); sendBtn.disabled = true;

        try{
            const isStream = streamToggle.checked;
            const res = await fetch(`${API_BASE}/query`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:text, session_id:sessionId, is_stream:isStream}) });
            if(!res.ok) throw new Error(await res.text() || '请求失败');
            const data = await res.json();

            if (!isStream) {
                // 【非流式模式】直接拿到最终结果渲染
                finalizeBotAnswer(botMsgEl, data.answer, data.error, data.image_urls);
                sendBtn.disabled = false;
                return;
            }

            // 【流式模式】建立 SSE 连接监听进度和文本流
            const es = new EventSource(`${API_BASE}/stream/${data.task_id}`);
            let rawAnswerText = '';
            const bubble = botMsgEl.querySelector('.bubble');
            let answerEl = bubble.querySelector('.answer');
            if(!answerEl){ answerEl = document.createElement('div'); answerEl.className = 'answer'; bubble.insertBefore(answerEl, bubble.firstChild); }

            es.addEventListener('progress', (e) => {
                try{
                    const d = JSON.parse(e.data);
                    renderProgress(botMsgEl, d.done_list, d.running_list, d.status);
                    if(d.status === 'completed') sendBtn.disabled = false;
                }catch(_){}
            });
            es.addEventListener('delta', (e) => {
                try{
                    const d = JSON.parse(e.data);
                    if(d.delta){ rawAnswerText += d.delta; renderAnswerWithImages(answerEl, rawAnswerText, []); scrollToBottom(); }
                }catch(_){}
            });

            const handleFinal = (e) => {
                try{
                    const d = JSON.parse(e.data);
                    const finalText = (d.answer && d.answer.trim()) ? d.answer : rawAnswerText;
                    finalizeBotAnswer(botMsgEl, finalText, d.error, d.image_urls);
                }catch(_){ finalizeBotAnswer(botMsgEl, rawAnswerText, null, []); }
                es.close(); sendBtn.disabled = false;
            };
            es.addEventListener('final', handleFinal);
            es.addEventListener('final_answer', handleFinal);

            es.addEventListener('error', () => {
                finalizeBotAnswer(botMsgEl, rawAnswerText, 'SSE 连接中断/失败', []);
                es.close(); sendBtn.disabled = false;
            });

        }catch(e){
            finalizeBotAnswer(botMsgEl, '', e.message || e, []);
            sendBtn.disabled = false;
        }
    }

    sendBtn.addEventListener('click', onSend);
    inputEl.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); onSend(); } });
    btnClear.addEventListener('click', async () => {
        if(!confirm('确定要清空当前会话的历史记录吗？')) return;
        try{ await fetch(`${API_BASE}/history/${sessionId}`, {method:'DELETE'}); }catch(e){ alert('服务端清空失败，仅清空本地显示'); }
        const nodes = Array.from(chatEl.querySelectorAll('.msg')); for(let i=1;i<nodes.length;i++) nodes[i].remove(); scrollToBottom();
    });

    loadHistory(); setTimeout(() => inputEl.focus(), 200);
</script>
</body>
</html>
